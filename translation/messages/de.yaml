    pressure: "**🧭 Luftdruck:** {pressure} hPa\n"

#########################################################
# Server Management (Autorole, etc.)
#########################################################
cog_autorole:
  error_types:
    role_to_high:
      title: "❌ Fehler"
      desc: "Ich kann diese Rolle nicht vergeben, da sie höher oder gleich meiner höchsten Rolle ist!"
    role_managed:
      title: "❌ Fehler"
      desc: "Diese Rolle wird von einer Integration verwaltet und kann nicht als Autorole hinzugefügt werden!"
    not_found:
      title: "❌ Autorole nicht gefunden"
      desc: "Es existiert keine Autorole mit der ID `{autorole_id}`!"
    wrong_guild:
      title: "❌ Fehler"
      desc: "Diese Autorole gehört nicht zu diesem Server!"
    no_roles:
      title: "❌ Keine Autoroles"
      desc: "Es sind keine Autoroles für diesen Server eingerichtet!"
    role_deleted:
      title: "⚠️ Rolle nicht gefunden"
      desc: "Die konfigurierte Rolle für `{autorole_id}` existiert nicht mehr!"

  messages:
    add_success:
      title: "✅ Autorole hinzugefügt"
      desc: "Neue Mitglieder erhalten automatisch die Rolle {role}\n\n**Autorole-ID:** `{autorole_id}`"
    remove_success:
      title: "✅ Autorole entfernt"
      desc: "Die Autorole `{autorole_id}` wurde erfolgreich entfernt!"
    toggle_success:
      enabled_title: "✅ Autorole aktiviert"
      enabled_desc: "Die Autorole `{autorole_id}` wurde aktiviert!"
      disabled_title: "✅ Autorole deaktiviert"
      disabled_desc: "Die Autorole `{autorole_id}` wurde deaktiviert!"
    list:
      title: "📋 Autoroles Liste"
      desc: "Alle Autoroles für **{guild_name}**"
      role_deleted: "⚠️ **Rolle gelöscht**"
    info:
      title: "ℹ️ Autorole Information"
      desc: "Details zur Autorole `{autorole_id}`"

  system:
    audit_reason: "Autorole System"
    console_log: "✅ Autoroles [{role_names}] wurden {member_name} zugewiesen"
    error_forbidden: "❌ Keine Berechtigung, um Rollen zu vergeben"
    error_http: "❌ Fehler beim Zuweisen der Rollen: {error}"

#########################################################
# About Cog (System Information)
#########################################################
cog_about:
  messages:
    title: "# ℹ️ Über ManagerX"
    description: "Ein fortschrittlicher Management-Bot entwickelt für professionelle Communities.\nManagerX bietet umfangreiche Tools für Moderation, Statistiken und Server-Verwaltung."
    dev_header: "## 👨💻 Entwicklung"
    dev_info: "Entwickelt von **ManagerX Development**\n❯ [🌐 Website](https://managerx-bot.de)\n❯ [💬 Support Server](https://discord.gg/9T28DWup3g)"
    stats_header: "## 📊 Statistiken"
    stats_info: "❯ **Server:** `{server_count}`\n❯ **User:** `{member_count}`\n❯ **Ping:** {ping}\n❯ **Uptime:** {uptime}"
    tech_header: "## 🛠️ Technik & Versionen"
    tech_info: "❯ **Python:** `v{python_version}`\n❯ **PyCord:** `v{discord_version}`\n❯ **EzCord:** `v{ezcord_version}`"
    system_header: "## 🖥️ System"
    system_info: "❯ **OS:** `{os}`\n❯ **RAM:** {ram}\n❯ **CPU:** {cpu}\n❯ **Speicher:** {storage}"
    footer: "{year} ManagerX Development • ManagerX v2.0.0"
